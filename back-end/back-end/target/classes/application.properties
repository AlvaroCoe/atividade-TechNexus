# URL de conexï¿½o: aponta para o localhost na porta 3307 e para o banco db_api
spring.datasource.url=jdbc:mysql://localhost:3306/db_api?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# Credenciais que definimos no Docker
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuraï¿½ï¿½es do Hibernate / JPA para criar as tabelas automaticamente das suas Entities
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

